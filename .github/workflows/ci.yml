---
name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  static:
    name: Static validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: 0.11.30

      - name: Install locked Python dependencies
        run: uv sync --locked

      - name: Install pinned Ansible collections
        run: uv run ansible-galaxy collection install --requirements-file requirements.yml

      - name: Check the lock file
        run: uv lock --check

      - name: Lint Ansible content
        run: uv run ansible-lint

      - name: Check playbook syntax
        run: uv run ansible-playbook --syntax-check main.yml

  molecule:
    name: Ubuntu 24.04 VM
    needs: static
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          persist-credentials: false

      - name: Install libvirt and VM tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            cloud-image-utils \
            libvirt-clients \
            libvirt-daemon-system \
            libvirt-dev \
            pkg-config \
            qemu-system-x86 \
            qemu-utils \
            virtinst
          sudo systemctl start libvirtd
          if ! sudo virsh net-info default >/dev/null 2>&1; then
            sudo virsh net-define /usr/share/libvirt/networks/default.xml
          fi
          if ! sudo virsh net-info default | grep --quiet 'Active:.*yes'; then
            sudo virsh net-start default
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version: 0.11.30

      - name: Install locked Molecule dependencies
        run: uv sync --locked --group molecule

      - name: Install pinned Ansible collections
        run: uv run ansible-galaxy collection install --requirements-file requirements.yml

      - name: Run the Ubuntu VM scenario
        run: uv run molecule test

      - name: Destroy any remaining test VM
        if: always()
        run: uv run molecule destroy
