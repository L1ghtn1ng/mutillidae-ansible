---
version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    target-branch: master

updates:
  - package-ecosystem: github-actions
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: all-dependencies
    cooldown:
      default-days: 7

  - package-ecosystem: uv
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: all-dependencies
    cooldown:
      default-days: 7
