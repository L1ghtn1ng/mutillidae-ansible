---
- name: Deploy Mutillidae on Ubuntu 24.04
  hosts: mutillidae
  become: true

  pre_tasks:
    - name: Verify the managed host is Ubuntu 24.04 LTS
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
          - ansible_facts.distribution_release == "noble"
        fail_msg: >-
          This playbook supports only Ubuntu 24.04 LTS (Noble); detected
          {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}.

  roles:
    - common
    - db
    - php
    - web

  handlers:
    - name: Restart Apache
      ansible.builtin.service:
        name: apache2
        state: restarted
