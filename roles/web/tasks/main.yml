---
- name: Check for an existing Mutillidae checkout
  ansible.builtin.stat:
    path: "{{ mutillidae_install_root }}/.git"
  register: web_mutillidae_checkout

- name: Clone the pinned Mutillidae release
  ansible.builtin.git:
    repo: "{{ mutillidae_source_repository }}"
    dest: "{{ mutillidae_install_root }}"
    version: "{{ mutillidae_source_version }}"
    clone: true
    update: false
  when: not web_mutillidae_checkout.stat.exists

- name: Preserve the role-managed database configuration
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "{{ mutillidae_install_root }}"
      - update-index
      - --skip-worktree
      - src/includes/database-config.inc
  changed_when: false

- name: Check out the pinned Mutillidae release
  ansible.builtin.git:
    repo: "{{ mutillidae_source_repository }}"
    dest: "{{ mutillidae_install_root }}"
    version: "{{ mutillidae_source_version }}"
    clone: false
    update: true

- name: Create Mutillidae writable directories
  ansible.builtin.file:
    path: "{{ mutillidae_web_root }}/{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0775"
  loop:
    - data
    - passwords

- name: Configure the Mutillidae database connection
  ansible.builtin.template:
    src: database-config.inc.j2
    dest: "{{ mutillidae_web_root }}/includes/database-config.inc"
    owner: root
    group: www-data
    mode: "0640"
  diff: false
  notify: Restart Apache

- name: Create the Mutillidae TLS directory
  ansible.builtin.file:
    path: /etc/ssl/mutillidae
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Generate the Mutillidae TLS private key
  community.crypto.openssl_privatekey:
    path: /etc/ssl/mutillidae/mutillidae-selfsigned.key
    owner: root
    group: root
    mode: "0600"
  notify: Restart Apache

- name: Generate the Mutillidae certificate signing request
  community.crypto.openssl_csr:
    path: /etc/ssl/mutillidae/mutillidae-selfsigned.csr
    privatekey_path: /etc/ssl/mutillidae/mutillidae-selfsigned.key
    common_name: mutillidae.localhost
    subject_alt_name:
      - DNS:mutillidae.localhost
      - DNS:www.mutillidae.localhost
      - DNS:cors.mutillidae.localhost
      - DNS:webservice.mutillidae.localhost
      - DNS:api.mutillidae.localhost
      - "IP:{{ ansible_facts['default_ipv4']['address'] }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Apache

- name: Generate the Mutillidae self-signed certificate
  community.crypto.x509_certificate:
    path: /etc/ssl/mutillidae/mutillidae-selfsigned.crt
    privatekey_path: /etc/ssl/mutillidae/mutillidae-selfsigned.key
    csr_path: /etc/ssl/mutillidae/mutillidae-selfsigned.csr
    provider: selfsigned
    selfsigned_not_after: +3650d
    owner: root
    group: root
    mode: "0644"
  notify: Restart Apache

- name: Install the Mutillidae Apache virtual hosts
  ansible.builtin.template:
    src: mutillidae.conf.j2
    dest: /etc/apache2/sites-available/000-mutillidae.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Apache

- name: Disable the default Apache virtual hosts
  ansible.builtin.file:
    path: "/etc/apache2/sites-enabled/{{ item }}"
    state: absent
  loop:
    - 000-default.conf
    - default-ssl.conf
  notify: Restart Apache

- name: Enable the Mutillidae Apache virtual hosts
  ansible.builtin.file:
    src: /etc/apache2/sites-available/000-mutillidae.conf
    dest: /etc/apache2/sites-enabled/000-mutillidae.conf
    state: link
    force: true
  notify: Restart Apache

- name: Validate the Apache configuration
  ansible.builtin.command: apache2ctl configtest
  changed_when: false
