---
- name: Remove anonymous MariaDB users
  ansible.mysql.mysql_user:
    config_file: ""
    host_all: true
    login_unix_socket: /run/mysqld/mysqld.sock
    name: ""
    state: absent

- name: Remove the MariaDB test database
  ansible.mysql.mysql_db:
    config_file: ""
    login_unix_socket: /run/mysqld/mysqld.sock
    name: test
    state: absent

- name: Create the Mutillidae database
  ansible.mysql.mysql_db:
    collation: utf8mb4_unicode_ci
    config_file: ""
    encoding: utf8mb4
    login_unix_socket: /run/mysqld/mysqld.sock
    name: "{{ mutillidae_db_name }}"
    state: present

- name: Create the restricted Mutillidae database user
  ansible.mysql.mysql_user:
    config_file: ""
    host: "{{ mutillidae_db_host }}"
    login_unix_socket: /run/mysqld/mysqld.sock
    name: "{{ mutillidae_db_user }}"
    password: "{{ mutillidae_db_password }}"
    state: present
  no_log: true

- name: Grant the Mutillidae user access to the application database
  ansible.mysql.mysql_query:
    config_file: ""
    login_unix_socket: /run/mysqld/mysqld.sock
    query: >-
      GRANT ALL PRIVILEGES ON
      `{{ mutillidae_db_name | replace('`', '``') }}`.* TO %s@%s
    positional_args:
      - "{{ mutillidae_db_user }}"
      - "{{ mutillidae_db_host }}"
  changed_when: false
  no_log: true
